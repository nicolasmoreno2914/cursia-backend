version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: orbia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orbia
      POSTGRES_PASSWORD: orbia_dev
      POSTGRES_DB: orbia
    ports:
      - '5432:5432'
    volumes:
      - orbia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U orbia -d orbia']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  orbia_pgdata:
    driver: local
