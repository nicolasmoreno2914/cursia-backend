# ══════════════════════════════════════════════════════════════════════════════
# deploy.yml — CI/CD: push a main → deploy automático en VPS Contabo
# ══════════════════════════════════════════════════════════════════════════════
#
# REQUISITOS (GitHub → Settings → Secrets and variables → Actions):
#
#   VPS_HOST        IP pública del VPS Contabo (167.86.98.162)
#   VPS_USER        Usuario SSH (cursia)
#   VPS_SSH_KEY     Clave privada SSH ed25519 del usuario cursia
#   VPS_PATH        /var/www/cursia-backend
#   HEALTH_URL      https://api.cursia.nomaddi.com/health
#
# ESTRATEGIA (una sola fase):
#   1. Compilar TypeScript en el runner de GitHub (Ubuntu, Node 22).
#   2. rsync de todo — incluido dist/ — al VPS con la clave SSH.
#      Esto reemplaza cualquier dist/ antiguo (incluso si era de root),
#      porque rsync crea los archivos como el usuario SSH (cursia).
#   3. SSH al VPS: npm install --omit=dev, migraciones, pm2 reload.
#      No se compila en el VPS → sin problema de permisos.
#
# ══════════════════════════════════════════════════════════════════════════════

name: Deploy to Contabo VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install all dependencies (including devDeps for tsc)
        run: npm ci

      - name: Compile TypeScript on runner
        run: npm run build

      - name: Verify dist/main.js
        run: |
          if [ ! -f dist/main.js ]; then
            echo "❌ dist/main.js no encontrado."
            exit 1
          fi
          echo "✅ dist/main.js OK — $(du -sh dist/ | cut -f1)"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Fix VPS file ownership (heals stale root-owned files from past manual deploys)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} ${{ secrets.VPS_PATH }}"

      - name: Sync source + dist to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude '.env.*' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/"

      - name: Install prod deps + migrate + restart on VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'set -e
               cd '"${{ secrets.VPS_PATH }}"'

               ensure_pm2_process() {
                 local name="$1"
                 local start_script="$2"
                 if sudo pm2 describe "$name" > /dev/null 2>&1; then
                   sudo pm2 restart "$name" --update-env
                 else
                   sudo pm2 start npm --name "$name" -- run "$start_script"
                 fi
               }

               echo "━━━ [1/4] Instalar dependencias de producción ━━━"
               npm install --omit=dev

               echo "━━━ [2/4] Alinear restricciones de production_jobs ━━━"
               node scripts/migrate-production-jobs-constraints.js

               echo "━━━ [3/4] Migrar usage_events y cost_rates ━━━"
               node scripts/migrate-usage-events-costs.js

               echo "━━━ [4/4] Recargar PM2 (zero-downtime) ━━━"
               sudo pm2 reload cursia-backend --update-env || sudo pm2 restart cursia-backend --update-env
               ensure_pm2_process cursia-content-worker start:content-worker
               ensure_pm2_process cursia-video-worker start:video-worker
               ensure_pm2_process cursia-audio-worker start:audio-worker
               ensure_pm2_process cursia-h5p-worker start:h5p-worker
               ensure_pm2_process cursia-package-worker start:package-worker
               ensure_pm2_process cursia-full-worker start:full-worker
               sudo pm2 save
               sudo pm2 status

               echo "✅ Deploy completado."'

      - name: Health check post-deploy
        run: |
          echo "Esperando 20 segundos para que NestJS inicialice…"
          sleep 20
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -sf --max-time 15 "${{ secrets.HEALTH_URL }}" || echo "FAILED")
            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              echo "✅ Health check OK (intento $i): $RESPONSE"
              exit 0
            fi
            echo "⏳ Intento $i: backend no disponible aún ($RESPONSE), esperando 8s…"
            sleep 8
          done
          echo "❌ Health check FALLÓ tras 5 intentos"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️  El deploy falló. Último commit desplegado: $(git rev-parse --short HEAD)"
          echo "Para rollback manual en VPS:"
          echo "  ssh cursia@${{ secrets.VPS_HOST }}"
          echo "  cd ${{ secrets.VPS_PATH }}"
          echo "  git checkout HEAD~1 && npm install --omit=dev && pm2 restart cursia-backend"
