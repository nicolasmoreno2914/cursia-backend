# ══════════════════════════════════════════════════════════════════════════════
# deploy.yml — CI/CD: push a main → deploy automático en VPS Contabo
# ══════════════════════════════════════════════════════════════════════════════
#
# REQUISITOS (GitHub → Settings → Secrets and variables → Actions):
#
#   VPS_HOST        IP pública del VPS Contabo
#   VPS_USER        Usuario SSH (root)
#   VPS_SSH_KEY     Clave privada SSH (contenido completo, con saltos de línea)
#   VPS_PATH        /var/www/cursia-backend
#   HEALTH_URL      https://api.cursia.nomaddi.com/health
#
# ESTRATEGIA:
#   1. build-check  — Compila TypeScript en el runner de GitHub (con devDeps).
#                     Nunca instala TypeScript en el VPS de producción.
#   2. deploy       — Sube dist/ al VPS via SSH, instala solo prod deps, recarga PM2.
#
# ══════════════════════════════════════════════════════════════════════════════

name: Deploy to Contabo VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: build — compila en GitHub, sube dist/ como artifact
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install all dependencies (including devDeps for tsc)
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: Verify dist/main.js
        run: |
          if [ ! -f dist/main.js ]; then
            echo "❌ dist/main.js no encontrado."
            exit 1
          fi
          echo "✅ dist/main.js OK — $(du -sh dist/ | cut -f1)"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: deploy — solo si el build pasó
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload dist/ to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/dist/"

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'ENDSSH'
            set -e
            cd ${{ secrets.VPS_PATH }}

            echo "━━━ [1/4] Git pull (sincronizar package.json y fuentes) ━━━"
            git pull origin main

            echo "━━━ [2/4] Instalar dependencias de producción ━━━"
            npm ci --omit=dev

            echo "━━━ [3/4] Recargar PM2 (graceful reload, zero downtime) ━━━"
            pm2 reload cursia-backend --update-env || pm2 restart cursia-backend --update-env

            echo "━━━ [4/4] Guardar estado PM2 ━━━"
            pm2 save

            echo "✅ Deploy completado."
          ENDSSH

      - name: Health check post-deploy
        run: |
          echo "Esperando 10 segundos para que NestJS inicialice…"
          sleep 10
          RESPONSE=$(curl -sf --max-time 15 "${{ secrets.HEALTH_URL }}" || echo "FAILED")
          if echo "$RESPONSE" | grep -q '"status":"ok"'; then
            echo "✅ Health check OK: $RESPONSE"
          else
            echo "❌ Health check FALLÓ: $RESPONSE"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️  El deploy falló."
          echo "Rollback manual en VPS:"
          echo "  cd ${{ secrets.VPS_PATH }}"
          echo "  git checkout HEAD~1"
          echo "  npm ci --omit=dev"
          echo "  pm2 restart cursia-backend"
