# ══════════════════════════════════════════════════════════════════════════════
# deploy.yml — CI/CD: push a main → deploy automático en VPS Contabo
# ══════════════════════════════════════════════════════════════════════════════
#
# REQUISITOS (GitHub → Settings → Secrets and variables → Actions):
#
#   VPS_HOST        IP pública del VPS Contabo (167.86.98.162)
#   VPS_USER        Usuario SSH (cursia)
#   VPS_SSH_KEY     Clave privada SSH ed25519 del usuario cursia
#   VPS_PATH        /var/www/cursia-backend
#   HEALTH_URL      https://api.cursia.nomaddi.com/health
#
# ESTRATEGIA:
#   1. build-check  — Verifica que el TypeScript compila en el runner de GitHub.
#                     Early-fail antes de tocar producción.
#   2. deploy       — SSH al VPS: git pull + npm install + tsc + npm ci + pm2 reload.
#                     Compila en el VPS para evitar diferencias entre plataformas.
#
# ══════════════════════════════════════════════════════════════════════════════

name: Deploy to Contabo VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: build-check — verifica que el TS compila sin errores (early-fail)
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build TypeScript (early check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install all dependencies (including devDeps for tsc)
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: Verify dist/main.js
        run: |
          if [ ! -f dist/main.js ]; then
            echo "❌ dist/main.js no encontrado."
            exit 1
          fi
          echo "✅ dist/main.js OK — $(du -sh dist/ | cut -f1)"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: deploy — solo si el build pasó
  # Compila TypeScript directamente en el VPS para evitar diferencias
  # entre el runner de GitHub y el servidor de producción.
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.env' \
            --exclude '.env.*' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/"

      - name: Build and restart on VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'set -e
               cd '"${{ secrets.VPS_PATH }}"'

               ensure_pm2_process() {
                 local name="$1"
                 local start_script="$2"
                 if pm2 describe "$name" > /dev/null 2>&1; then
                   pm2 restart "$name" --update-env
                 else
                   pm2 start npm --name "$name" -- run "$start_script"
                 fi
               }

               echo "━━━ [1/5] Instalar todas las dependencias (devDeps para tsc) ━━━"
               npm install

               echo "━━━ [2/5] Alinear restricciones de production_jobs ━━━"
               node scripts/migrate-production-jobs-constraints.js

               echo "━━━ [3/5] Compilar TypeScript en el VPS ━━━"
               npm run build

               echo "━━━ [4/5] Limpiar devDeps — dejar solo producción ━━━"
               npm install --omit=dev

               echo "━━━ [5/5] Recargar PM2 (zero-downtime) ━━━"
               pm2 reload cursia-backend --update-env || pm2 restart cursia-backend --update-env
               ensure_pm2_process cursia-content-worker start:content-worker
               ensure_pm2_process cursia-video-worker start:video-worker
               ensure_pm2_process cursia-audio-worker start:audio-worker
               ensure_pm2_process cursia-h5p-worker start:h5p-worker
               ensure_pm2_process cursia-package-worker start:package-worker
               ensure_pm2_process cursia-full-worker start:full-worker
               pm2 save
               pm2 status

               echo "✅ Deploy completado."'

      - name: Health check post-deploy
        run: |
          echo "Esperando 20 segundos para que NestJS inicialice…"
          sleep 20
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -sf --max-time 15 "${{ secrets.HEALTH_URL }}" || echo "FAILED")
            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              echo "✅ Health check OK (intento $i): $RESPONSE"
              exit 0
            fi
            echo "⏳ Intento $i: backend no disponible aún ($RESPONSE), esperando 8s…"
            sleep 8
          done
          echo "❌ Health check FALLÓ tras 5 intentos"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️  El deploy falló."
          echo "Rollback manual en VPS:"
          echo "  ssh cursia@${{ secrets.VPS_HOST }}"
          echo "  cd ${{ secrets.VPS_PATH }}"
          echo "  git checkout HEAD~1 && npm install && npm run build && npm ci --omit=dev"
          echo "  pm2 restart cursia-backend"
