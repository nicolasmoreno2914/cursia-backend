# ══════════════════════════════════════════════════════════════════════════════
# deploy.yml — CI/CD: push a main → deploy automático en VPS Contabo
# ══════════════════════════════════════════════════════════════════════════════
#
# REQUISITOS (configurar en GitHub → Settings → Secrets and variables → Actions):
#
#   VPS_HOST        IP pública del VPS Contabo
#   VPS_USER        Usuario SSH (cursia)
#   VPS_SSH_KEY     Clave privada SSH (contenido completo, con saltos de línea)
#   VPS_PATH        /var/www/cursia-backend
#   HEALTH_URL      https://api.cursia.nomaddi.com/health
#
# ══════════════════════════════════════════════════════════════════════════════

name: Deploy to Contabo VPS

on:
  push:
    branches: [main]
  workflow_dispatch:           # permite lanzar el deploy manualmente desde GitHub UI

concurrency:
  group: deploy-production
  cancel-in-progress: false    # nunca cancelar un deploy en curso

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: build-check (corre en GitHub, no toca el VPS)
  # ────────────────────────────────────────────────────────────────────────────
  build-check:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Verify dist/main.js exists
        run: |
          if [ ! -f dist/main.js ]; then
            echo "❌ dist/main.js no encontrado. El build falló."
            exit 1
          fi
          echo "✅ dist/main.js existe. Build OK."

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: deploy (solo si build-check pasa)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-check
    environment: production

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'ENDSSH'
            set -e
            echo "━━━ [1/6] Entrar al directorio ━━━"
            cd ${{ secrets.VPS_PATH }}

            echo "━━━ [2/6] Git pull ━━━"
            git pull origin main

            echo "━━━ [3/6] Instalar dependencias (sin devDependencies) ━━━"
            npm ci --omit=dev

            echo "━━━ [4/6] Build ━━━"
            npm run build

            echo "━━━ [5/6] Reiniciar PM2 (graceful reload) ━━━"
            pm2 reload cursia-backend --update-env || pm2 restart cursia-backend --update-env

            echo "━━━ [6/6] Guardar estado PM2 ━━━"
            pm2 save

            echo "✅ Deploy completado."
          ENDSSH

      - name: Health check post-deploy
        run: |
          echo "Esperando 8 segundos para que NestJS inicialice..."
          sleep 8
          RESPONSE=$(curl -sf --max-time 10 "${{ secrets.HEALTH_URL }}" || echo "FAILED")
          if echo "$RESPONSE" | grep -q '"status":"ok"'; then
            echo "✅ Health check OK: $RESPONSE"
          else
            echo "❌ Health check FALLÓ: $RESPONSE"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️  El deploy o health check fallaron."
          echo "Revisar: pm2 logs cursia-backend en el VPS."
          echo "Rollback manual: git checkout HEAD~1 && npm ci --omit=dev && npm run build && pm2 restart cursia-backend"
