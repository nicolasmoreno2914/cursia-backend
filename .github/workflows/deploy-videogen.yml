name: Deploy Videogen to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Videogen to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Check videogen deploy options
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'echo "=== pm2 ls as cursia user (finds videogen processes?) ==="
               pm2 ls 2>/dev/null | head -20

               echo "=== Check if deploy script is executable ==="
               ls -la /var/www/videogen/scripts/deploy.sh 2>/dev/null

               echo "=== Try to run deploy script without sudo ==="
               bash /var/www/videogen/scripts/deploy.sh 2>&1 | tail -5 || echo "deploy.sh failed: $?"

               echo "=== Check /var/www/videogen remote ==="
               git -C /var/www/videogen remote -v 2>/dev/null || echo "no git access"

               echo "=== Check pm2 list ALL ==="
               pm2 list 2>/dev/null | grep -E "videogen|online|stopped|errored" | head -10

               echo "=== Check ecosystem config ==="
               cat /var/www/videogen/ecosystem.config.js 2>/dev/null | head -20'