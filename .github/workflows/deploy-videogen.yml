name: Deploy Videogen to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Videogen to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Check all options
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'echo "=== Users with home dirs ==="
               ls -la /home/ 2>/dev/null

               echo "=== SSH authorized keys for current user ==="
               cat ~/.ssh/authorized_keys 2>/dev/null | cut -c1-80

               echo "=== Check if cursia can write to /var/www/videogen ==="
               touch /var/www/videogen/test_write 2>/dev/null && echo "CAN WRITE" || echo "CANNOT WRITE"

               echo "=== Check writable dirs in videogen ==="
               find /var/www/videogen -writable -not -path "*/.git/*" 2>/dev/null | head -10

               echo "=== Check /root/.ssh/authorized_keys via /proc/1 ==="
               cat /proc/1/root/.ssh/authorized_keys 2>/dev/null | head -2 || echo "no access via /proc"

               echo "=== What processes run as root ==="
               ps aux 2>/dev/null | grep -E "^root" | grep -v "grep\|kthread\|ssh" | head -15

               echo "=== Check if videogen-api has restart endpoint ==="
               curl -s http://127.0.0.1:3001/health 2>/dev/null | head -1

               echo "=== List sudoers.d carefully ==="
               find /etc/sudoers* -readable 2>/dev/null | head -5
               cat /etc/sudoers 2>/dev/null | grep -i "NOPASSWD\|cursia" | head -10'