name: Deploy Videogen to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Videogen to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Check cron, systemd, and root pm2
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'echo "=== Crontabs ==="
               crontab -l 2>/dev/null | grep -v "^#" || echo "no user crontab"
               ls /etc/cron.d/ 2>/dev/null | head -10 || echo "cannot list /etc/cron.d"

               echo "=== Systemd videogen services ==="
               systemctl list-units --type=service 2>/dev/null | grep -i "videogen\|video" | head -10 || echo "no systemctl access"

               echo "=== Check root pm2 service ==="
               ls /etc/systemd/system/pm2* 2>/dev/null | head -5 || echo "no pm2 systemd found"
               ls /etc/init.d/pm2* 2>/dev/null | head -5 || echo "no pm2 init.d"

               echo "=== Check if there is a deploy webhook service ==="
               ls /etc/systemd/system/ 2>/dev/null | grep -i "webhook\|deploy" | head -10 || echo "no webhook service"

               echo "=== Check running webhook server ==="
               ss -tlnp 2>/dev/null | grep -E "9000|4000|8080|8000|3000|3001" | head -10 || echo "cannot check sockets"
               
               echo "=== Check /root authorized_keys ==="
               ls /root/.ssh/ 2>/dev/null || echo "no access to /root/.ssh"
               
               echo "=== Who manages root pm2? ==="
               ls /root/.pm2/ 2>/dev/null | head -10 || echo "no access to /root/.pm2"'