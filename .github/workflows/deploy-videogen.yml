# deploy-videogen.yml — Check sudo rules and try to deploy Videogen

name: Deploy Videogen to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Videogen to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Check sudo rules and deploy options
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'echo "=== Sudo rules ==="
               sudo -l 2>/dev/null | head -20 || echo "sudo -l requires password"
               echo "=== Check /etc/sudoers.d ==="
               ls /etc/sudoers.d/ 2>/dev/null || echo "cannot list sudoers.d"
               echo "=== Check if deploy script is NOPASSWD ==="
               cat /etc/sudoers.d/* 2>/dev/null | grep -v "^#\|^$" | head -20 || echo "cannot read sudoers.d"
               echo "=== Current git commit on VPS ==="
               git -C /var/www/videogen log --oneline -3 2>/dev/null || echo "git log failed"
               echo "=== FETCH_HEAD ==="
               cat /var/www/videogen/.git/FETCH_HEAD 2>/dev/null || echo "cannot read FETCH_HEAD"
               echo "=== Last backend build ==="
               ls -la /var/www/videogen/backend/dist/ 2>/dev/null | head -10 || echo "no dist/"'