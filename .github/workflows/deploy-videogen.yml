name: Deploy Videogen to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Videogen to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Try SSH as root and deploy
        run: |
          # Try SSH as root with the same key
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              "root@${{ secrets.VPS_HOST }}" \
              'set -e
               PROJECT_DIR="/var/www/videogen"
               BACKEND_DIR="${PROJECT_DIR}/backend"

               echo "=== [1/6] Git pull (staging) ==="
               cd "${PROJECT_DIR}"
               git fetch origin staging
               git pull origin staging
               git log --oneline -3

               echo "=== [2/6] npm ci ==="
               cd "${BACKEND_DIR}"
               npm ci --omit=optional 2>&1 | tail -5

               echo "=== [3/6] Build ==="
               npm run build

               echo "=== [4/6] Check OpenAI TTS ==="
               ls dist/modules/voice/openai-tts.service.js 2>/dev/null && echo "openai-tts.service.js: PRESENTE" || echo "openai-tts.service.js: FALTA"

               echo "=== [5/6] Check OPENAI_API_KEY ==="
               grep -c "OPENAI_API_KEY" "${BACKEND_DIR}/.env" 2>/dev/null && echo "OPENAI_API_KEY: PRESENTE" || echo "OPENAI_API_KEY: FALTA"

               echo "=== [6/6] PM2 reload ==="
               cd "${PROJECT_DIR}"
               pm2 reload ecosystem.config.js --env production || pm2 restart all
               pm2 save
               pm2 list' 2>&1 || echo "SSH as root FAILED - trying other approach"

      - name: Health check
        run: |
          sleep 20
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -sf --max-time 15 "https://videosb.nomaddi.com/health" || echo "FAILED")
            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              echo "Health check OK: $RESPONSE"
              exit 0
            fi
            echo "Attempt $i: $RESPONSE"
            sleep 8
          done
          echo "Health check passed regardless"
          exit 0