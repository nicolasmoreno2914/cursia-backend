name: Deploy Videogen to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Videogen to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Try SSH to videob server (207.180.230.206)
        run: |
          ssh-keyscan -H 207.180.230.206 >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Try as root on videob server
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o ConnectTimeout=10 \
              "root@207.180.230.206" \
              'echo "CONNECTED AS ROOT TO VIDEOB"
               whoami
               ls /var/www/ 2>/dev/null || echo "no /var/www"
               pm2 list 2>/dev/null | head -10 || echo "no pm2 as root"' 2>&1 || echo "root@207.180.230.206 FAILED"
          
          # Try with cursia user on videob
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o ConnectTimeout=10 \
              "${{ secrets.VPS_USER }}@207.180.230.206" \
              'echo "CONNECTED AS CURSIA TO VIDEOB"
               whoami
               ls /var/www/' 2>&1 || echo "${{ secrets.VPS_USER }}@207.180.230.206 FAILED"
              
          # Try with nicolas user on videob
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o ConnectTimeout=10 \
              "nicolas@207.180.230.206" \
              'echo "CONNECTED AS NICOLAS TO VIDEOB"
               whoami
               ls /var/www/' 2>&1 || echo "nicolas@207.180.230.206 FAILED"
              
          # Try with videogen user on production
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o ConnectTimeout=10 \
              "nicolas@${{ secrets.VPS_HOST }}" \
              'echo "CONNECTED AS NICOLAS"
               whoami' 2>&1 || echo "nicolas@VPS_HOST FAILED"