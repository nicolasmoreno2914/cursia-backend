# deploy-videogen.yml — Deploys video-gen-ai-backend to /var/www/videogen on VPS
# Manual trigger only (workflow_dispatch)

name: Deploy Videogen to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Videogen to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Investigate VPS state
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'echo "=== Who am I ===" && whoami && id
               echo "=== Listing /var/www ===" && ls -la /var/www/
               echo "=== ls /var/www/videogen ===" && ls -la /var/www/videogen/ 2>/dev/null || echo "dir not found"
               echo "=== ls /var/www/videogen/.git ===" && ls -la /var/www/videogen/.git/ 2>/dev/null | head -5 || echo "git dir not found"
               echo "=== who owns videogen dir ===" && stat -c "%U %G" /var/www/videogen 2>/dev/null || echo "stat failed"
               echo "=== can sudo deploy script? ===" && sudo bash /var/www/videogen/scripts/deploy.sh --check 2>/dev/null || echo "deploy script sudo failed: $?"
               echo "=== pm2 list ===" && pm2 list 2>/dev/null || echo "pm2 not in PATH for this user"
               echo "=== find pm2 ===" && which pm2 2>/dev/null || find /usr -name pm2 2>/dev/null | head -3 || find /home -name pm2 2>/dev/null | head -3'

      - name: Health check
        run: |
          curl -sf "https://videosb.nomaddi.com/health" && echo "Health OK" || echo "Health failed"